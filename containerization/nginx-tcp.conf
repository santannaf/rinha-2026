worker_processes 1;
worker_rlimit_nofile 8192;

events {
    worker_connections 512;
    multi_accept on;
    use epoll;
}

http {
    access_log off;
    error_log /dev/null crit;

    tcp_nodelay on;
    tcp_nopush off;

    keepalive_timeout 65s;
    keepalive_requests 100000;
    reset_timedout_connection on;

    upstream api {
        # TCP loopback entre nginx e backends — variante de controle pra A/B
        # contra UDS. Usa hostname Docker DNS pra resolver os 2 services.
        least_conn;
        server api1:8080 max_fails=2 fail_timeout=5s;
        server api2:8080 max_fails=2 fail_timeout=5s;
        keepalive 64;
        keepalive_requests 100000;
        keepalive_timeout 60s;
    }

    server {
        listen 9999 backlog=2048 default_server;

        location / {
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_request_buffering off;
            proxy_socket_keepalive on;
        }
    }
}
